name: Publish new release

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        description: Select the release type
        required: true
        options:
          - patch
          - minor

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.git-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # Use a recent npm version that supports npm stage publish
      - name: Install npm
        run: |
          sudo npm install -g npm@11.17.0

      - name: Publish
        run: |
          make publish-${{ github.event.inputs.release-type }}

      - name: Get last git tag
        id: git-tag
        run: echo "tag=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Generate zip archives
        run: |
          cd bin/darwin-x64 && zip darwin-x64.zip * && cd -
          cd bin/darwin-arm64 && zip darwin-arm64.zip * && cd -
          cd bin/linux-x64 && zip linux-x64.zip * && cd -
          cd bin/linux-arm64 && zip linux-arm64.zip * && cd -
          cd bin/windows-x64 && zip windows-x64.zip * && cd -

      - name: Upload portable archives
        uses: actions/upload-artifact@v4
        with:
          name: portable-archives
          path: bin/**/*.zip

  windows-installer:
    needs: publish
    runs-on: windows-latest

    steps:
      - name: Checkout released version
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.publish.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build embedded dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build portable executable
        shell: pwsh
        run: |
          $version = "${{ needs.publish.outputs.tag }}".TrimStart("v")
          New-Item -ItemType Directory -Force bin/windows-x64 | Out-Null
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath "-ldflags=-s -w -X github.com/akiver/cs-demo-analyzer/pkg/cli.Version=$version" -o bin/windows-x64/csda.exe ./cmd/cli

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ needs.publish.outputs.tag }}".TrimStart("v")
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$version" installer/windows.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: bin/windows-x64/csda-windows-x64-setup.exe

  release:
    needs: [publish, windows-installer]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'release-assets/**/*'
          tag: ${{ needs.publish.outputs.tag }}
