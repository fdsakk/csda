name: Publish new release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Release version in vMAJOR.MINOR.PATCH format
        required: true
        default: v0.1.0

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate version
        id: version
        shell: bash
        run: |
          tag='${{ inputs.version }}'
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vMAJOR.MINOR.PATCH format (for example v0.1.0)." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  windows-installer:
    needs: validate
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Download and verify map geometry
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check awpy==2.0.2
          awpy get tris
          $tris = Join-Path $HOME ".awpy\tris"
          @("de_mirage", "de_dust2", "de_nuke", "de_ancient", "de_anubis") | ForEach-Object {
            $path = Join-Path $tris "$_.tri"
            if (-not (Test-Path $path -PathType Leaf) -or (Get-Item $path).Length -eq 0) {
              throw "Missing map geometry: $path"
            }
          }
          New-Item -ItemType Directory -Force bin/windows-x64 | Out-Null
          Copy-Item $tris bin/windows-x64/tris -Recurse

      - name: Build embedded dashboard
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin/windows-x64 | Out-Null
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath "-ldflags=-s -w -X github.com/fdsakk/csda/pkg/cli.Version=${{ needs.validate.outputs.version }}" -o bin/windows-x64/csda.exe ./cmd/cli

      - name: Package portable archive
        shell: pwsh
        run: |
          Compress-Archive -Path bin/windows-x64/csda.exe,bin/windows-x64/tris -DestinationPath bin/windows-x64/windows-x64.zip

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ needs.validate.outputs.version }}" installer/windows.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            bin/windows-x64/windows-x64.zip
            bin/windows-x64/csda-windows-x64-setup.exe
          if-no-files-found: error

  release:
    needs: [validate, windows-installer]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: release-assets/**/*
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          name: CS Demo Analyzer ${{ needs.validate.outputs.tag }}
          tag: ${{ needs.validate.outputs.tag }}
