name: Publish new release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: Release version in vMAJOR.MINOR.PATCH format
        required: true
        default: v0.1.0

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  portable:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate version
        id: version
        shell: bash
        run: |
          tag='${{ inputs.version }}'
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vMAJOR.MINOR.PATCH format (for example v0.1.0)." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build embedded dashboard
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build portable binaries
        run: |
          make VERSION='${{ steps.version.outputs.version }}' \
            build-darwin \
            build-darwin-arm64 \
            build-linux \
            build-linux-arm64 \
            build-windows-binary

      - name: Generate portable archives
        run: |
          cd bin/darwin-x64 && zip darwin-x64.zip csda && cd -
          cd bin/darwin-arm64 && zip darwin-arm64.zip csda && cd -
          cd bin/linux-x64 && zip linux-x64.zip csda && cd -
          cd bin/linux-arm64 && zip linux-arm64.zip csda && cd -
          cd bin/windows-x64 && zip windows-x64.zip csda.exe && cd -

      - name: Upload portable archives
        uses: actions/upload-artifact@v4
        with:
          name: portable-archives
          path: bin/**/*.zip
          if-no-files-found: error

  windows-installer:
    needs: portable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build embedded dashboard
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin/windows-x64 | Out-Null
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath "-ldflags=-s -w -X github.com/fdsakk/csda/pkg/cli.Version=${{ needs.portable.outputs.version }}" -o bin/windows-x64/csda.exe ./cmd/cli

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ needs.portable.outputs.version }}" installer/windows.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: bin/windows-x64/csda-windows-x64-setup.exe
          if-no-files-found: error

  release:
    needs: [portable, windows-installer]
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: release-assets/**/*
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          name: CS Demo Analyzer ${{ needs.portable.outputs.tag }}
          tag: ${{ needs.portable.outputs.tag }}
