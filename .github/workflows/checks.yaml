name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Download demos cache file
        run: curl -L -o demos.txt https://gitlab.com/akiver/cs-demos/-/raw/main/demos.txt

      - name: Restore demos cache
        uses: actions/cache@v5
        id: demos-cache
        with:
          path: cs-demos
          key: demos-${{ hashFiles('demos.txt') }}

      - name: Download demos
        if: steps.demos-cache.outputs.cache-hit != 'true'
        run: ./download-demos.sh

      - name: Test
        run: go test ./tests

  stats-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build web UI
        working-directory: web
        run: bun run build

      - name: Test player stats, web server, and application packages
        run: go test ./pkg/api ./pkg/web ./pkg/cli
